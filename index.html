<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cocaflix</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Navigation -->
    <nav class="navbar">
      <h2 class="logo">Cocaflix</h2>
      <ul>
        <li class="btn">Movies</li>
        <li class="btn">TV Series</li>
        <li class="btn">Sports</li>
        <li class="btn">Kids</li>
        <li class="btn">Anime</li>
      </ul>
      <button class="signin">Sign In</button>
    </nav>

    <!-- Banner -->
    <header class="banner">
      <div class="banner-content">
        <h1>The Batman</h1>
        <p>Most Streamed This Month</p>
        <p>2h 56m | Action • Crime • Drama</p>
        <button class="btn">PLAY NOW</button>
        <button class="btn">WATCH LATER</button>
      </div>
    </header>

    <!-- Movie Rows -->
    <section class="row">
      <h2>Popular Right Now</h2>
      <div class="row-posters" id="popular"></div>
    </section>

    <script src="script.js"></script>
  </body>
</html>
